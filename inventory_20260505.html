        const CATEGORIES = ["\u624b\u673a", "\u5e73\u677f", "PC", "\u7a7f\u6234", "\u97f3\u9891", "\u5176\u4ed6"];
        const CATEGORY_DISPLAY = {"\u624b\u673a": "\ud83d\udcf1 \u624b\u673a", "\u5e73\u677f": "\ud83d\udcf2 \u5e73\u677f", "PC": "\ud83d\udcbb PC", "\u7a7f\u6234": "\u231a \u7a7f\u6234", "\u97f3\u9891": "\ud83c\udfa7 \u97f3\u9891", "\u5176\u4ed6": "\ud83d\udce6 \u5176\u4ed6"};
        const KA_LIST = ["\u5317\u6597", "\u5b8f\u7fd4", "\u6052\u946b\u8fbe", "\u540c\u821f", "\u94ed\u6d0b", "\u4fca\u6377", "\u7c73\u9633", "\u4ebf\u4e30\u8fbe", "\u667a\u987a"];
        
        let currentUser=null, allowedKAs=[], currentCategory='手机', currentProduct='';
        
        function checkAuthFromStorage(){
            const authCode=localStorage.getItem('inv_auth_code'), authTime=localStorage.getItem('inv_auth_time'), authKAs=localStorage.getItem('inv_auth_ka');
            if(!authCode||!authTime||!authKAs)return false;
            if(Date.now()-parseInt(authTime)>AUTH_EXPIRE_MS){clearAuth();return false;}
            if(authCode===accessConfig.admin){currentUser='admin';allowedKAs=[...KA_LIST];return true;}
            for(const[ka,code]of Object.entries(accessConfig.ka_codes)){if(authCode===code){currentUser=ka;allowedKAs=[ka];return true;}}
            clearAuth();return false;
        }
        function saveAuth(code,kas){localStorage.setItem('inv_auth_code',code);localStorage.setItem('inv_auth_ka',JSON.stringify(kas));localStorage.setItem('inv_auth_time',Date.now().toString());}
        function clearAuth(){localStorage.removeItem('inv_auth_code');localStorage.removeItem('inv_auth_ka');localStorage.removeItem('inv_auth_time');}
        function checkCode(){
            const code=document.getElementById('securityCode').value.trim(),errorEl=document.getElementById('loginError');
            if(code===accessConfig.admin){currentUser='admin';allowedKAs=[...KA_LIST];saveAuth(code,[...KA_LIST]);showDashboard();return;}
            for(const[ka,code]of Object.entries(accessConfig.ka_codes)){if(code===code){currentUser=ka;allowedKAs=[ka];saveAuth(code,[ka]);showDashboard();return;}}
            errorEl.style.display='block';setTimeout(()=>errorEl.style.display='none',3000);
        }
        function showDashboard(){
            document.getElementById('loginOverlay').style.display='none';
            document.getElementById('dashboardContent').style.display='block';
            initTabs();renderContent();
        }
        function logout(){clearAuth();location.reload();}
        function initTabs(){
            document.getElementById('categoryTabs').innerHTML=CATEGORIES.map(c=>`<button class="tab ${c===currentCategory?'active':''}" onclick="switchCategory('${c}')">${CATEGORY_DISPLAY[c]}</button>`).join('');
        }
        function switchCategory(cat){currentCategory=cat;currentProduct='';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelector(`[onclick="switchCategory('${cat}')"]`).classList.add('active');updateSelect();renderContent();}
        function updateSelect(){
            const sel=document.getElementById('productSelect'),catData=DATA.categories[currentCategory];
            if(!catData)return;
            sel.innerHTML='<option value="">-- 品类汇总 --</option>'+catData.products.map(p=>`<option value="${p}">${p}</option>`).join('');
            sel.value=currentProduct;
        }
        function onProductChange(){currentProduct=document.getElementById('productSelect').value;renderContent();}
        function updateStats(){
            let h=0,a=0,r=0;
            Object.entries(DATA.categories).forEach(([c,cd])=>{if(!cd.ka_summary)return;Object.entries(cd.ka_summary).forEach(([k,d])=>{if(!allowedKAs.includes(k))return;if(d.dos!==null&&d.dos!==undefined){if(d.dos<14)h++;else if(d.dos<=30)a++;else r++;}});});
            document.getElementById('statsRow').innerHTML=`<div class="stat-card healthy"><div class="stat-value">${h}</div><div class="stat-label">🟢 健康</div></div><div class="stat-card attention"><div class="stat-value">${a}</div><div class="stat-label">🟡 关注</div></div><div class="stat-card risk"><div class="stat-value">${r}</div><div class="stat-label">🔴 高风险</div></div>`;
        }
        function renderContent(){updateStats();const area=document.getElementById('contentArea'),catData=DATA.categories[currentCategory];if(!catData){area.innerHTML='<p>暂无数据</p>';return;}
            if(currentProduct){area.innerHTML=renderProductDetail();}else{area.innerHTML=renderCategorySummary();}
        }
        function renderCategorySummary(){
            const catData=DATA.categories[currentCategory],s=catData.summary;
            let html=`<div class="summary-grid"><div class="summary-card"><h3>📊 ${currentCategory} 品类汇总</h3><div class="summary-metric"><span class="label">总ST</span><span class="value">${s.total_st.toLocaleString()}</span></div><div class="summary-metric"><span class="label">总SO</span><span class="value">${s.total_so.toLocaleString()}</span></div><div class="summary-metric"><span class="label">库存</span><span class="value">${s.total_inventory.toLocaleString()}</span></div><div class="summary-metric"><span class="label">产品数</span><span class="value">${catData.products.length}</span></div></div></div><h3 style="margin:20px 0 16px">📋 KA客户明细</h3><table class="data-table"><thead><tr><th>客户</th><th>ST</th><th>SO</th><th>库存</th><th>转化率</th><th>DOS</th><th>状态</th></tr></thead><tbody>`;
            Object.entries(catData.ka_summary).forEach(([k,d])=>{if(!allowedKAs.includes(k))return;
                const risk=d.dos===null||d.dos===undefined?'unknown':(d.dos<14?'healthy':(d.dos<=30?'attention':'high_risk'));
                const riskBadge=risk==='healthy'?'🟢 健康':(risk==='attention'?'🟡 关注':(risk==='high_risk'?'🔴 高风险':'--'));
                const convClass=d.conversion_rate===null?'':(d.conversion_rate>=50?'cell-green':(d.conversion_rate>=30?'cell-yellow':'cell-red'));
                const dosClass=d.dos===null?'':(d.dos<7?'cell-green':(d.dos<=14?'cell-yellow':'cell-red'));
                html+=`<tr class="ka-total-row"><td><strong>${k}</strong></td><td>${d.st.toLocaleString()}</td><td>${d.so.toLocaleString()}</td><td>${d.inventory.toLocaleString()}</td><td class="${convClass}">${d.conversion_rate!==null?d.conversion_rate+'%':'--'}</td><td class="${dosClass}">${d.dos!==null?d.dos:'--'}</td><td><span class="risk-badge risk-${risk==='healthy'?'healthy':(risk==='attention'?'attention':'high')}">${riskBadge}</span></td></tr>`;
            });
            return html+'</tbody></table>';
        }
        function renderProductDetail(){
            const p=DATA.products[currentProduct];if(!p)return'<p>无数据</p>';
            let html=`<div class="summary-grid"><div class="summary-card"><h3>📱 ${currentProduct}</h3><div class="summary-metric"><span class="label">总ST</span><span class="value">${p.st.toLocaleString()}</span></div><div class="summary-metric"><span class="label">总SO</span><span class="value">${p.so.toLocaleString()}</span></div><div class="summary-metric"><span class="label">库存</span><span class="value">${p.inventory.toLocaleString()}</span></div><div class="summary-metric"><span class="label">转化率</span><span class="value">${p.conversion_rate}%</span></div></div></div><h3 style="margin:20px 0 16px">📋 KA客户明细</h3><table class="data-table"><thead><tr><th>客户</th><th>ST</th><th>SO</th><th>库存</th><th>转化率</th></tr></thead><tbody>`;
            Object.entries(p.by_ka).forEach(([k,d])=>{if(!allowedKAs.includes(k))return;
                const convClass=d.conversion_rate===null?'':(d.conversion_rate>=50?'cell-green':(d.conversion_rate>=30?'cell-yellow':'cell-red'));
                html+=`<tr><td><strong>${k}</strong></td><td>${d.st.toLocaleString()}</td><td>${d.so.toLocaleString()}</td><td>${d.inventory.toLocaleString()}</td><td class="${convClass}">${d.conversion_rate!==null?d.conversion_rate+'%':'--'}</td></tr>`;
            });
            return html+'</tbody></table>';
        }
        function exportData(){
            let csv='\uFEFF客户,ST,SO,库存,转化率,DOS\n';
            Object.entries(DATA.categories).forEach(([c,cd])=>{if(!currentProduct&&currentCategory===c&&cd.ka_summary){Object.entries(cd.ka_summary).forEach(([k,d])=>{if(!allowedKAs.includes(k))return;csv+=`${k},${d.st},${d.so},${d.inventory},${d.conversion_rate||0}%,${d.dos||'--'}\n`;});}});
            if(currentProduct&&DATA.products[currentProduct]){Object.entries(DATA.products[currentProduct].by_ka).forEach(([k,d])=>{if(!allowedKAs.includes(k))return;csv+=`${k},${d.st},${d.so},${d.inventory},${d.conversion_rate||0}%\n`;});}
            const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');
            a.href=url;a.download=`进销存_${currentProduct||currentCategory}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
        }
        function toggleDarkMode(){const isDark=document.body.classList.toggle('dark');localStorage.setItem('inv_dark_mode',isDark?'1':'0');document.getElementById('darkToggle').textContent=isDark?'☀️':'🌙';}
        document.addEventListener('DOMContentLoaded',function(){if(localStorage.getItem('inv_dark_mode')==='1'){document.body.classList.add('dark');document.getElementById('darkToggle').textContent='☀️';}if(checkAuthFromStorage())showDashboard();});
